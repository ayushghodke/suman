<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Suman Enterprises — Government Electrical Contracting Infrastructure">
  <title>Suman Enterprises Hero — Power Infrastructure</title>
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2A4A"/>
      <stop offset="55%" stop-color="#1F4E8C"/>
      <stop offset="100%" stop-color="#2B6BB5"/>
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2240"/>
      <stop offset="100%" stop-color="#061629"/>
    </linearGradient>
    <!-- Building face gradients -->
    <linearGradient id="bldgFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A6FB0"/>
      <stop offset="100%" stop-color="#1F4E8C"/>
    </linearGradient>
    <linearGradient id="bldgSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#234E85"/>
      <stop offset="100%" stop-color="#102E55"/>
    </linearGradient>
    <linearGradient id="transformer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A6A7A"/>
      <stop offset="100%" stop-color="#2E3A47"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5B547"/>
      <stop offset="100%" stop-color="#E89B1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B547" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F5B547" stop-opacity="0"/>
    </radialGradient>
    <!-- Star pattern for sky -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#FFFFFF" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="600" fill="url(#dots)"/>

  <!-- Distant glow / sun -->
  <circle cx="1280" cy="280" r="360" fill="url(#glow)"/>
  <circle cx="1280" cy="280" r="55" fill="#F5B547" opacity="0.85"/>

  <!-- Distant city silhouette -->
  <g opacity="0.55">
    <rect x="0"   y="540" width="80"  height="120" fill="#0A2240"/>
    <rect x="80"  y="500" width="60"  height="160" fill="#0A2240"/>
    <rect x="140" y="520" width="100" height="140" fill="#0A2240"/>
    <rect x="240" y="470" width="70"  height="190" fill="#0A2240"/>
    <rect x="310" y="510" width="90"  height="150" fill="#0A2240"/>
    <rect x="1230" y="500" width="80"  height="160" fill="#0A2240"/>
    <rect x="1310" y="470" width="60"  height="190" fill="#0A2240"/>
    <rect x="1370" y="520" width="90"  height="140" fill="#0A2240"/>
    <rect x="1460" y="490" width="70"  height="170" fill="#0A2240"/>
    <rect x="1530" y="510" width="70"  height="150" fill="#0A2240"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="660" width="1600" height="240" fill="url(#ground)"/>
  <line x1="0" y1="660" x2="1600" y2="660" stroke="#1F4E8C" stroke-width="2" opacity="0.5"/>

  <!-- ====== LEFT: HT TRANSMISSION PYLON ====== -->
  <g transform="translate(180, 200)">
    <!-- Pylon main structure -->
    <g stroke="#5A6A7A" stroke-width="3" fill="none" stroke-linecap="round">
      <!-- Vertical legs -->
      <line x1="-50" y1="460" x2="-15" y2="80"/>
      <line x1="50" y1="460" x2="15" y2="80"/>
      <!-- Horizontal cross-arms -->
      <line x1="-95" y1="120" x2="95" y2="120"/>
      <line x1="-110" y1="180" x2="110" y2="180"/>
      <line x1="-130" y1="250" x2="130" y2="250"/>
      <!-- Diagonal lattice -->
      <line x1="-50" y1="460" x2="50" y2="420"/>
      <line x1="50" y1="460" x2="-50" y2="420"/>
      <line x1="-45" y1="420" x2="45" y2="380"/>
      <line x1="45" y1="420" x2="-45" y2="380"/>
      <line x1="-40" y1="380" x2="40" y2="340"/>
      <line x1="40" y1="380" x2="-40" y2="340"/>
      <line x1="-37" y1="340" x2="37" y2="300"/>
      <line x1="37" y1="340" x2="-37" y2="300"/>
      <line x1="-33" y1="300" x2="33" y2="260"/>
      <line x1="33" y1="300" x2="-33" y2="260"/>
      <line x1="-28" y1="250" x2="28" y2="210"/>
      <line x1="28" y1="250" x2="-28" y2="210"/>
      <line x1="-23" y1="210" x2="23" y2="180"/>
      <line x1="23" y1="210" x2="-23" y2="180"/>
      <line x1="-20" y1="180" x2="20" y2="150"/>
      <line x1="20" y1="180" x2="-20" y2="150"/>
      <line x1="-17" y1="150" x2="17" y2="120"/>
      <line x1="17" y1="150" x2="-17" y2="120"/>
      <line x1="-14" y1="120" x2="14" y2="80"/>
      <line x1="14" y1="120" x2="-14" y2="80"/>
      <!-- Side bracing horizontals -->
      <line x1="-45" y1="420" x2="45" y2="420"/>
      <line x1="-40" y1="380" x2="40" y2="380"/>
      <line x1="-37" y1="340" x2="37" y2="340"/>
      <line x1="-33" y1="300" x2="33" y2="300"/>
      <line x1="-28" y1="250" x2="28" y2="250"/>
      <line x1="-23" y1="210" x2="23" y2="210"/>
      <line x1="-20" y1="180" x2="20" y2="180"/>
      <line x1="-17" y1="150" x2="17" y2="150"/>
    </g>
    <!-- Insulators -->
    <g fill="#F7F9FC">
      <circle cx="-95" cy="135" r="5"/><circle cx="-95" cy="148" r="5"/><circle cx="-95" cy="161" r="5"/>
      <circle cx="95"  cy="135" r="5"/><circle cx="95"  cy="148" r="5"/><circle cx="95"  cy="161" r="5"/>
      <circle cx="-110" cy="195" r="5"/><circle cx="-110" cy="208" r="5"/><circle cx="-110" cy="221" r="5"/>
      <circle cx="110"  cy="195" r="5"/><circle cx="110"  cy="208" r="5"/><circle cx="110"  cy="221" r="5"/>
      <circle cx="-130" cy="265" r="5"/><circle cx="-130" cy="278" r="5"/><circle cx="-130" cy="291" r="5"/>
      <circle cx="130"  cy="265" r="5"/><circle cx="130"  cy="278" r="5"/><circle cx="130"  cy="291" r="5"/>
    </g>
  </g>

  <!-- ====== TRANSMISSION CABLES (curving across the scene) ====== -->
  <g stroke="#F7F9FC" stroke-width="1.6" fill="none" opacity="0.85">
    <path d="M 85,295 Q 500,360 900,330"/>
    <path d="M 275,295 Q 500,365 900,335"/>
    <path d="M 70,355 Q 500,430 900,395"/>
    <path d="M 290,355 Q 500,435 900,400"/>
    <path d="M 50,425 Q 500,510 900,470"/>
    <path d="M 310,425 Q 500,515 900,475"/>
  </g>

  <!-- ====== CENTER: HIGH-RISE BUILDING (Building Electrification) ====== -->
  <g transform="translate(720, 220)">
    <!-- Building front face -->
    <rect x="0" y="0" width="180" height="440" fill="url(#bldgFront)"/>
    <!-- Building side face -->
    <polygon points="180,0 240,30 240,470 180,440" fill="url(#bldgSide)"/>
    <!-- Roof -->
    <polygon points="0,0 60,-30 240,-30 180,0" fill="#4A82C5"/>
    <polygon points="240,-30 240,30 180,0" fill="#1A3F70"/>
    <!-- Windows grid (front) -->
    <g fill="#F5B547" opacity="0.92">
      <!-- 8 floors x 4 windows -->
      <rect x="15"  y="20"  width="20" height="28" rx="1"/>
      <rect x="55"  y="20"  width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="95"  y="20"  width="20" height="28" rx="1"/>
      <rect x="135" y="20"  width="20" height="28" rx="1"/>
      <rect x="15"  y="65"  width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="55"  y="65"  width="20" height="28" rx="1"/>
      <rect x="95"  y="65"  width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="135" y="65"  width="20" height="28" rx="1"/>
      <rect x="15"  y="110" width="20" height="28" rx="1"/>
      <rect x="55"  y="110" width="20" height="28" rx="1"/>
      <rect x="95"  y="110" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="135" y="110" width="20" height="28" rx="1"/>
      <rect x="15"  y="155" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="55"  y="155" width="20" height="28" rx="1"/>
      <rect x="95"  y="155" width="20" height="28" rx="1"/>
      <rect x="135" y="155" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="15"  y="200" width="20" height="28" rx="1"/>
      <rect x="55"  y="200" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="95"  y="200" width="20" height="28" rx="1"/>
      <rect x="135" y="200" width="20" height="28" rx="1"/>
      <rect x="15"  y="245" width="20" height="28" rx="1"/>
      <rect x="55"  y="245" width="20" height="28" rx="1"/>
      <rect x="95"  y="245" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="135" y="245" width="20" height="28" rx="1"/>
      <rect x="15"  y="290" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="55"  y="290" width="20" height="28" rx="1"/>
      <rect x="95"  y="290" width="20" height="28" rx="1"/>
      <rect x="135" y="290" width="20" height="28" rx="1" opacity="0.45"/>
      <rect x="15"  y="335" width="20" height="28" rx="1"/>
      <rect x="55"  y="335" width="20" height="28" rx="1"/>
      <rect x="95"  y="335" width="20" height="28" rx="1"/>
      <rect x="135" y="335" width="20" height="28" rx="1"/>
      <!-- Ground floor entrance -->
      <rect x="75" y="385" width="40" height="50" fill="#0B2A4A" opacity="1"/>
    </g>
    <!-- Side face windows -->
    <g fill="#F5B547" opacity="0.55">
      <rect x="190" y="35"  width="14" height="22"/>
      <rect x="215" y="42"  width="14" height="22"/>
      <rect x="190" y="80"  width="14" height="22"/>
      <rect x="215" y="87"  width="14" height="22"/>
      <rect x="190" y="125" width="14" height="22"/>
      <rect x="215" y="132" width="14" height="22"/>
      <rect x="190" y="170" width="14" height="22"/>
      <rect x="215" y="177" width="14" height="22"/>
      <rect x="190" y="215" width="14" height="22"/>
      <rect x="215" y="222" width="14" height="22"/>
      <rect x="190" y="260" width="14" height="22"/>
      <rect x="215" y="267" width="14" height="22"/>
      <rect x="190" y="305" width="14" height="22"/>
      <rect x="215" y="312" width="14" height="22"/>
      <rect x="190" y="350" width="14" height="22"/>
      <rect x="215" y="357" width="14" height="22"/>
    </g>
    <!-- Lightning rod on top -->
    <line x1="120" y1="-30" x2="120" y2="-75" stroke="#5A6A7A" stroke-width="2"/>
    <circle cx="120" cy="-78" r="3" fill="#E89B1C"/>
  </g>

  <!-- Adjacent shorter building -->
  <g transform="translate(540, 380)">
    <rect x="0" y="0" width="140" height="280" fill="#234E85"/>
    <polygon points="140,0 180,20 180,300 140,280" fill="#102E55"/>
    <g fill="#F5B547" opacity="0.85">
      <rect x="12" y="18"  width="16" height="22"/>
      <rect x="42" y="18"  width="16" height="22" opacity="0.45"/>
      <rect x="72" y="18"  width="16" height="22"/>
      <rect x="102" y="18" width="16" height="22"/>
      <rect x="12" y="55"  width="16" height="22" opacity="0.45"/>
      <rect x="42" y="55"  width="16" height="22"/>
      <rect x="72" y="55"  width="16" height="22"/>
      <rect x="102" y="55" width="16" height="22" opacity="0.45"/>
      <rect x="12" y="92"  width="16" height="22"/>
      <rect x="42" y="92"  width="16" height="22"/>
      <rect x="72" y="92"  width="16" height="22" opacity="0.45"/>
      <rect x="102" y="92" width="16" height="22"/>
      <rect x="12" y="129" width="16" height="22"/>
      <rect x="42" y="129" width="16" height="22" opacity="0.45"/>
      <rect x="72" y="129" width="16" height="22"/>
      <rect x="102" y="129" width="16" height="22"/>
      <rect x="12" y="166" width="16" height="22" opacity="0.45"/>
      <rect x="42" y="166" width="16" height="22"/>
      <rect x="72" y="166" width="16" height="22"/>
      <rect x="102" y="166" width="16" height="22" opacity="0.45"/>
      <rect x="12" y="203" width="16" height="22"/>
      <rect x="42" y="203" width="16" height="22"/>
      <rect x="72" y="203" width="16" height="22"/>
      <rect x="102" y="203" width="16" height="22"/>
    </g>
  </g>

  <!-- ====== RIGHT: TRANSFORMER STATION (echoing brochure photos) ====== -->
  <g transform="translate(1080, 470)">
    <!-- Plinth/foundation -->
    <rect x="-15" y="170" width="290" height="20" fill="#1A2533"/>
    <!-- Transformer body -->
    <rect x="20" y="60" width="220" height="110" fill="url(#transformer)" rx="3"/>
    <!-- Cooling fins -->
    <g fill="#3A4754">
      <rect x="14" y="80" width="6" height="80"/>
      <rect x="240" y="80" width="6" height="80"/>
      <line x1="14" y1="85" x2="20" y2="85" stroke="#3A4754" stroke-width="1"/>
    </g>
    <!-- Top conservator tank -->
    <rect x="50" y="38" width="160" height="22" fill="#5A6A7A" rx="11"/>
    <circle cx="60" cy="49" r="6" fill="#F5B547"/>
    <circle cx="200" cy="49" r="6" fill="#F5B547"/>
    <!-- HT bushings (3 phase) -->
    <g>
      <rect x="65"  y="0" width="14" height="40" fill="#F5B547" rx="2"/>
      <rect x="123" y="0" width="14" height="40" fill="#F5B547" rx="2"/>
      <rect x="181" y="0" width="14" height="40" fill="#F5B547" rx="2"/>
      <!-- Bushing tops (porcelain rings) -->
      <ellipse cx="72" cy="-3" rx="11" ry="3" fill="#F7F9FC"/>
      <ellipse cx="130" cy="-3" rx="11" ry="3" fill="#F7F9FC"/>
      <ellipse cx="188" cy="-3" rx="11" ry="3" fill="#F7F9FC"/>
    </g>
    <!-- LT bushings (4 phase, smaller, on right side panel) -->
    <g>
      <rect x="80"  y="170" width="6" height="0" fill="none"/>
    </g>
    <!-- Nameplate -->
    <rect x="100" y="100" width="60" height="40" fill="#0B2A4A" stroke="#F5B547" stroke-width="1"/>
    <text x="130" y="115" font-family="Inter, Arial, sans-serif" font-size="9" fill="#F5B547" text-anchor="middle" font-weight="700">22/630</text>
    <text x="130" y="128" font-family="Inter, Arial, sans-serif" font-size="8" fill="#F7F9FC" text-anchor="middle">KVA</text>
    <!-- Wheels -->
    <circle cx="50"  cy="180" r="10" fill="#1A2533" stroke="#5A6A7A" stroke-width="2"/>
    <circle cx="210" cy="180" r="10" fill="#1A2533" stroke="#5A6A7A" stroke-width="2"/>
    <!-- Connection from pylon cables down to bushings -->
    <path d="M 900,330 Q 1000,200 1152,-3" stroke="#F7F9FC" stroke-width="1.6" fill="none" opacity="0.75"/>
    <path d="M 900,400 Q 1000,260 1210,-3" stroke="#F7F9FC" stroke-width="1.6" fill="none" opacity="0.75"/>
  </g>

  <!-- Substation fence (subtle) -->
  <g stroke="#5A6A7A" stroke-width="1.5" opacity="0.6">
    <line x1="1050" y1="660" x2="1050" y2="700"/>
    <line x1="1080" y1="660" x2="1080" y2="700"/>
    <line x1="1110" y1="660" x2="1110" y2="700"/>
    <line x1="1140" y1="660" x2="1140" y2="700"/>
    <line x1="1170" y1="660" x2="1170" y2="700"/>
    <line x1="1200" y1="660" x2="1200" y2="700"/>
    <line x1="1230" y1="660" x2="1230" y2="700"/>
    <line x1="1260" y1="660" x2="1260" y2="700"/>
    <line x1="1290" y1="660" x2="1290" y2="700"/>
    <line x1="1320" y1="660" x2="1320" y2="700"/>
    <line x1="1350" y1="660" x2="1350" y2="700"/>
    <line x1="1380" y1="660" x2="1380" y2="700"/>
    <line x1="1410" y1="660" x2="1410" y2="700"/>
    <line x1="1040" y1="670" x2="1420" y2="670"/>
    <line x1="1040" y1="685" x2="1420" y2="685"/>
  </g>

  <!-- ====== STREET LIGHT POLE (foreground left) ====== -->
  <g transform="translate(420, 380)">
    <line x1="0" y1="0" x2="0" y2="280" stroke="#5A6A7A" stroke-width="4"/>
    <path d="M 0,8 Q 8,8 14,18 L 30,40" stroke="#5A6A7A" stroke-width="3" fill="none"/>
    <rect x="26" y="40" width="22" height="6" fill="#5A6A7A" rx="2"/>
    <!-- Light glow -->
    <circle cx="37" cy="50" r="40" fill="#F5B547" opacity="0.16"/>
    <circle cx="37" cy="50" r="20" fill="#F5B547" opacity="0.3"/>
    <circle cx="37" cy="50" r="6" fill="#F5B547"/>
    <!-- Base -->
    <rect x="-8" y="278" width="16" height="6" fill="#5A6A7A"/>
  </g>

  <!-- ====== ENGINEER FIGURE (foreground center, scale & humanity) ====== -->
  <g transform="translate(960, 555)">
    <!-- Hard hat -->
    <ellipse cx="0" cy="-105" rx="18" ry="6" fill="#E89B1C"/>
    <path d="M -16,-105 Q 0,-128 16,-105 Z" fill="#E89B1C"/>
    <line x1="-12" y1="-108" x2="12" y2="-108" stroke="#A06B14" stroke-width="1"/>
    <!-- Head -->
    <circle cx="0" cy="-90" r="11" fill="#D4A574"/>
    <!-- Body / safety jacket -->
    <path d="M -22,-78 L 22,-78 L 26,-15 L -26,-15 Z" fill="#0B2A4A"/>
    <!-- Reflective bands -->
    <rect x="-26" y="-50" width="52" height="4" fill="#F5B547"/>
    <rect x="-26" y="-30" width="52" height="4" fill="#F5B547"/>
    <!-- Arms -->
    <rect x="-30" y="-76" width="8" height="50" fill="#0B2A4A" rx="3"/>
    <rect x="22" y="-76" width="8" height="50" fill="#0B2A4A" rx="3"/>
    <!-- Hands (one holding clipboard) -->
    <circle cx="-27" cy="-22" r="4" fill="#D4A574"/>
    <circle cx="27" cy="-22" r="4" fill="#D4A574"/>
    <!-- Clipboard -->
    <rect x="-44" y="-40" width="22" height="28" fill="#F7F9FC" stroke="#5A6A7A" stroke-width="1"/>
    <rect x="-40" y="-36" width="14" height="2" fill="#5A6A7A"/>
    <rect x="-40" y="-31" width="14" height="2" fill="#5A6A7A"/>
    <rect x="-40" y="-26" width="10" height="2" fill="#5A6A7A"/>
    <!-- Trousers -->
    <rect x="-22" y="-15" width="20" height="50" fill="#1A2533"/>
    <rect x="2" y="-15" width="20" height="50" fill="#1A2533"/>
    <!-- Boots -->
    <ellipse cx="-12" cy="38" rx="11" ry="5" fill="#0A1520"/>
    <ellipse cx="12" cy="38" rx="11" ry="5" fill="#0A1520"/>
  </g>

  <!-- Ground reflections / subtle highlights -->
  <g opacity="0.2">
    <ellipse cx="180" cy="710" rx="160" ry="6" fill="#F7F9FC"/>
    <ellipse cx="810" cy="710" rx="220" ry="6" fill="#F7F9FC"/>
    <ellipse cx="1190" cy="710" rx="200" ry="6" fill="#F7F9FC"/>
  </g>

  <!-- Subtle horizon line -->
  <line x1="0" y1="660" x2="1600" y2="660" stroke="#F5B547" stroke-width="0.5" opacity="0.4"/>
</svg>
