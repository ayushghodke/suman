<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 200" width="1600" height="200" role="img" aria-label="Suman Enterprises credentials and certifications">
  <title>Credentials Strip — Government Licensed, MSEDCL/MSETCL, ISO, MSME, GST, 15 Years</title>
  <rect width="1600" height="200" fill="#0B2A4A"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1600" height="3" fill="#E89B1C"/>
  <rect x="0" y="197" width="1600" height="3" fill="#E89B1C"/>

  <!-- Group 1: Govt Licensed -->
  <g transform="translate(133, 100)">
    <!-- Mini shield -->
    <path d="M 0,-36 L 24,-28 L 24,-4 Q 24,18 0,30 Q -24,18 -24,-4 L -24,-28 Z"
          fill="none" stroke="#E89B1C" stroke-width="2.2"/>
    <path d="M 4,-22 L -8,2 L 0,2 L -4,18 L 10,-6 L 2,-6 L 6,-22 Z" fill="#E89B1C"/>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">GOVT LICENSED</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">CEI Maharashtra</text>
  </g>

  <!-- Divider -->
  <line x1="266" y1="60" x2="266" y2="140" stroke="#1F4E8C" stroke-width="1"/>

  <!-- Group 2: MSEDCL/MSETCL -->
  <g transform="translate(400, 100)">
    <!-- Mini pylon -->
    <g stroke="#E89B1C" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="-10" y1="22" x2="-4" y2="-22"/>
      <line x1="10" y1="22" x2="4" y2="-22"/>
      <line x1="-16" y1="-12" x2="16" y2="-12"/>
      <line x1="-20" y1="0" x2="20" y2="0"/>
      <line x1="-10" y1="22" x2="10" y2="16"/>
      <line x1="10" y1="22" x2="-10" y2="16"/>
      <line x1="-7" y1="0" x2="7" y2="-6"/>
      <line x1="7" y1="0" x2="-7" y2="-6"/>
    </g>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">MSEDCL &amp; MSETCL</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">Approved Liaison</text>
  </g>

  <line x1="533" y1="60" x2="533" y2="140" stroke="#1F4E8C" stroke-width="1"/>

  <!-- Group 3: 15 Years -->
  <g transform="translate(666, 100)">
    <circle r="32" fill="none" stroke="#E89B1C" stroke-width="2.2"/>
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="22" fill="#E89B1C" text-anchor="middle" font-weight="800" dominant-baseline="middle">15</text>
    <text x="0" y="14" font-family="Inter, Arial, sans-serif" font-size="6" fill="#F7F9FC" text-anchor="middle" font-weight="600" letter-spacing="1">YEARS</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">15 YEARS</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">of Experience</text>
  </g>

  <line x1="800" y1="60" x2="800" y2="140" stroke="#1F4E8C" stroke-width="1"/>

  <!-- Group 4: ISO -->
  <g transform="translate(933, 100)">
    <circle r="32" fill="none" stroke="#E89B1C" stroke-width="2.2"/>
    <text x="0" y="-2" font-family="Inter, Arial, sans-serif" font-size="14" fill="#E89B1C" text-anchor="middle" font-weight="800">ISO</text>
    <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="9" fill="#F7F9FC" text-anchor="middle" font-weight="700">9001</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">ISO 9001:2015</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">Quality Certified</text>
  </g>

  <line x1="1066" y1="60" x2="1066" y2="140" stroke="#1F4E8C" stroke-width="1"/>

  <!-- Group 5: MSME -->
  <g transform="translate(1200, 100)">
    <polygon points="0,-32 28,-12 28,16 0,32 -28,16 -28,-12" fill="none" stroke="#E89B1C" stroke-width="2.2"/>
    <text x="0" y="6" font-family="Inter, Arial, sans-serif" font-size="13" fill="#E89B1C" text-anchor="middle" font-weight="800" letter-spacing="1">MSME</text>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">MSME / UDYAM</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">Registered Enterprise</text>
  </g>

  <line x1="1333" y1="60" x2="1333" y2="140" stroke="#1F4E8C" stroke-width="1"/>

  <!-- Group 6: GST -->
  <g transform="translate(1466, 100)">
    <rect x="-32" y="-22" width="64" height="44" rx="4" fill="none" stroke="#E89B1C" stroke-width="2.2"/>
    <text x="-6" y="6" font-family="Inter, Arial, sans-serif" font-size="14" fill="#E89B1C" text-anchor="middle" font-weight="800">GST</text>
    <circle cx="14" cy="0" r="7" fill="#2E7D4F"/>
    <path d="M 11,0 L 13,3 L 17,-2" stroke="#F7F9FC" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="56" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="700" letter-spacing="1">GST COMPLIANT</text>
    <text x="0" y="72" font-family="Inter, Arial, sans-serif" font-size="9" fill="#E89B1C" text-anchor="middle" font-weight="500">Registered &amp; Filing</text>
  </g>
</svg>
