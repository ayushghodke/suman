<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Railway Electrification">
  <title>Railway Electrification</title>
  <rect width="120" height="120" rx="16" fill="#F7F9FC"/>
  <!-- Overhead catenary support poles -->
  <g stroke="#0B2A4A" stroke-width="2.4" stroke-linecap="round" fill="none">
    <line x1="20" y1="22" x2="20" y2="78"/>
    <line x1="100" y1="22" x2="100" y2="78"/>
    <line x1="20" y1="28" x2="50" y2="28"/>
    <line x1="100" y1="28" x2="70" y2="28"/>
  </g>
  <!-- Catenary wires -->
  <g stroke="#1F4E8C" stroke-width="1.4" fill="none">
    <line x1="20" y1="34" x2="100" y2="34"/>
    <line x1="20" y1="42" x2="100" y2="42"/>
    <!-- Vertical hangers -->
    <line x1="35" y1="34" x2="35" y2="42"/>
    <line x1="50" y1="34" x2="50" y2="42"/>
    <line x1="65" y1="34" x2="65" y2="42"/>
    <line x1="80" y1="34" x2="80" y2="42"/>
  </g>
  <!-- Train body -->
  <g>
    <rect x="20" y="52" width="80" height="30" rx="6" fill="#1F4E8C" stroke="#0B2A4A" stroke-width="2.2"/>
    <!-- Pantograph -->
    <path d="M 50,52 L 56,46 L 64,46 L 70,52" fill="none" stroke="#0B2A4A" stroke-width="2"/>
    <line x1="44" y1="46" x2="76" y2="46" stroke="#E89B1C" stroke-width="2"/>
    <!-- Front window -->
    <path d="M 26,58 L 36,58 L 36,68 L 26,68 Z" fill="#F5B547"/>
    <!-- Other windows -->
    <rect x="42" y="60" width="10" height="8" fill="#F5B547" rx="1"/>
    <rect x="58" y="60" width="10" height="8" fill="#F5B547" rx="1"/>
    <rect x="74" y="60" width="10" height="8" fill="#F5B547" rx="1"/>
    <rect x="90" y="60" width="6" height="8" fill="#0B2A4A" rx="1"/>
    <!-- Door line -->
    <line x1="89" y1="58" x2="89" y2="80" stroke="#0B2A4A" stroke-width="1"/>
    <!-- Wheels -->
    <circle cx="32" cy="84" r="6" fill="none" stroke="#0B2A4A" stroke-width="2.2"/>
    <circle cx="48" cy="84" r="6" fill="none" stroke="#0B2A4A" stroke-width="2.2"/>
    <circle cx="72" cy="84" r="6" fill="none" stroke="#0B2A4A" stroke-width="2.2"/>
    <circle cx="88" cy="84" r="6" fill="none" stroke="#0B2A4A" stroke-width="2.2"/>
  </g>
  <!-- Track -->
  <line x1="14" y1="98" x2="106" y2="98" stroke="#0B2A4A" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="14" y1="104" x2="106" y2="104" stroke="#0B2A4A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Sleepers -->
  <g stroke="#0B2A4A" stroke-width="1" opacity="0.5">
    <line x1="22" y1="98" x2="22" y2="104"/>
    <line x1="38" y1="98" x2="38" y2="104"/>
    <line x1="54" y1="98" x2="54" y2="104"/>
    <line x1="70" y1="98" x2="70" y2="104"/>
    <line x1="86" y1="98" x2="86" y2="104"/>
    <line x1="100" y1="98" x2="100" y2="104"/>
  </g>
</svg>
