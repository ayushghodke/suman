<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="HT and LT Cable Laying and Jointing">
  <title>HT &amp; LT Cable Laying &amp; Jointing</title>
  <rect width="120" height="120" rx="16" fill="#F7F9FC"/>
  <!-- Cable spool -->
  <g>
    <!-- Spool sides (ellipses for 3D feel) -->
    <ellipse cx="60" cy="40" rx="34" ry="10" fill="#1F4E8C" stroke="#0B2A4A" stroke-width="2.2"/>
    <rect x="26" y="40" width="68" height="44" fill="#3A6FB0"/>
    <ellipse cx="60" cy="84" rx="34" ry="10" fill="#1F4E8C" stroke="#0B2A4A" stroke-width="2.2"/>
    <line x1="26" y1="40" x2="26" y2="84" stroke="#0B2A4A" stroke-width="2.2"/>
    <line x1="94" y1="40" x2="94" y2="84" stroke="#0B2A4A" stroke-width="2.2"/>
    <!-- Cable wound on spool -->
    <g stroke="#0B2A4A" stroke-width="1" fill="none" opacity="0.6">
      <line x1="32" y1="48" x2="88" y2="48"/>
      <line x1="32" y1="54" x2="88" y2="54"/>
      <line x1="32" y1="60" x2="88" y2="60"/>
      <line x1="32" y1="66" x2="88" y2="66"/>
      <line x1="32" y1="72" x2="88" y2="72"/>
      <line x1="32" y1="78" x2="88" y2="78"/>
    </g>
    <!-- Center hub -->
    <circle cx="60" cy="62" r="6" fill="#0B2A4A"/>
    <circle cx="60" cy="62" r="2" fill="#E89B1C"/>
  </g>
  <!-- Cable trailing off (with conductor cores visible at end) -->
  <path d="M 94,72 Q 108,76 102,96" stroke="#1F4E8C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="4" fill="#E89B1C" stroke="#0B2A4A" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="1.5" fill="#0B2A4A"/>
  <!-- Trench / ground -->
  <line x1="14" y1="106" x2="106" y2="106" stroke="#0B2A4A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Trench markers -->
  <g fill="#E89B1C">
    <rect x="18" y="22" width="3" height="8"/>
    <rect x="18" y="32" width="3" height="4"/>
  </g>
</svg>
