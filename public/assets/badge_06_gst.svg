<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="GST Registered and Compliant">
  <title>GST Registered &amp; Compliant</title>
  <!-- Rounded rectangle ribbon -->
  <rect x="14" y="36" width="132" height="88" rx="8" fill="#0B2A4A" stroke="#E89B1C" stroke-width="2.5"/>
  <rect x="22" y="44" width="116" height="72" rx="4" fill="none" stroke="#E89B1C" stroke-width="1" opacity="0.5"/>
  <!-- Top tag -->
  <polygon points="20,28 140,28 132,40 28,40" fill="#E89B1C"/>
  <text x="80" y="38" font-family="Inter, Arial, sans-serif" font-size="9" fill="#0B2A4A" text-anchor="middle" font-weight="800" letter-spacing="2">REGISTERED</text>
  <!-- Bottom tag -->
  <polygon points="28,124 132,124 140,136 20,136" fill="#E89B1C"/>
  <text x="80" y="134" font-family="Inter, Arial, sans-serif" font-size="9" fill="#0B2A4A" text-anchor="middle" font-weight="800" letter-spacing="2">COMPLIANT</text>
  <!-- GST big text -->
  <text x="80" y="86" font-family="Inter, Arial, sans-serif" font-size="38" fill="#E89B1C" text-anchor="middle" font-weight="800" letter-spacing="2">GST</text>
  <!-- Check mark -->
  <g transform="translate(80, 100)">
    <circle r="8" fill="#2E7D4F"/>
    <path d="M -4,0 L -1,3 L 4,-3" stroke="#F7F9FC" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
