<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="APFC Panels and Power Quality">
  <title>APFC Panels &amp; Power Quality</title>
  <rect width="120" height="120" rx="16" fill="#F7F9FC"/>
  <!-- Panel cabinet -->
  <rect x="22" y="18" width="76" height="84" rx="3" fill="#5A6A7A" stroke="#0B2A4A" stroke-width="2.4"/>
  <!-- Inner door / face -->
  <rect x="28" y="24" width="64" height="72" fill="#3A4754"/>
  <!-- Top: PF gauge / display -->
  <rect x="34" y="30" width="52" height="18" fill="#0B2A4A" stroke="#E89B1C" stroke-width="1.2"/>
  <!-- Gauge dial -->
  <path d="M 40,46 A 10,10 0 0 1 60,46" fill="none" stroke="#E89B1C" stroke-width="1.5"/>
  <line x1="50" y1="46" x2="56" y2="38" stroke="#E89B1C" stroke-width="1.5" stroke-linecap="round"/>
  <text x="72" y="42" font-family="Inter, Arial, sans-serif" font-size="7" fill="#E89B1C" text-anchor="middle" font-weight="700">0.98</text>
  <text x="72" y="48" font-family="Inter, Arial, sans-serif" font-size="4" fill="#F7F9FC" text-anchor="middle">PF</text>
  <!-- Capacitor steps (rows of indicator + button) -->
  <g>
    <circle cx="36" cy="58" r="2" fill="#2E7D4F"/>
    <rect x="42" y="56" width="46" height="4" fill="#5A6A7A"/>
    <circle cx="36" cy="66" r="2" fill="#2E7D4F"/>
    <rect x="42" y="64" width="46" height="4" fill="#5A6A7A"/>
    <circle cx="36" cy="74" r="2" fill="#2E7D4F"/>
    <rect x="42" y="72" width="46" height="4" fill="#5A6A7A"/>
    <circle cx="36" cy="82" r="2" fill="#E89B1C"/>
    <rect x="42" y="80" width="46" height="4" fill="#5A6A7A"/>
    <circle cx="36" cy="90" r="2" fill="#5A6A7A"/>
    <rect x="42" y="88" width="46" height="4" fill="#5A6A7A"/>
  </g>
  <!-- Door handle -->
  <rect x="86" y="56" width="3" height="12" fill="#E89B1C"/>
  <!-- Ground -->
  <line x1="14" y1="106" x2="106" y2="106" stroke="#0B2A4A" stroke-width="2.4" stroke-linecap="round"/>
</svg>
