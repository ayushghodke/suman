<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="15 Years of Experience">
  <title>15 Years of Experience</title>
  <!-- Outer ring -->
  <circle cx="80" cy="80" r="74" fill="#0B2A4A"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="#E89B1C" stroke-width="2"/>
  <!-- Decorative laurel left -->
  <g fill="#E89B1C">
    <ellipse cx="22" cy="80" rx="3" ry="9" transform="rotate(-20 22 80)"/>
    <ellipse cx="26" cy="62" rx="3" ry="9" transform="rotate(-30 26 62)"/>
    <ellipse cx="36" cy="46" rx="3" ry="9" transform="rotate(-45 36 46)"/>
    <ellipse cx="50" cy="34" rx="3" ry="9" transform="rotate(-60 50 34)"/>
    <ellipse cx="26" cy="98" rx="3" ry="9" transform="rotate(20 26 98)"/>
    <ellipse cx="32" cy="116" rx="3" ry="9" transform="rotate(35 32 116)"/>
    <ellipse cx="44" cy="130" rx="3" ry="9" transform="rotate(50 44 130)"/>
  </g>
  <g fill="#E89B1C">
    <ellipse cx="138" cy="80" rx="3" ry="9" transform="rotate(20 138 80)"/>
    <ellipse cx="134" cy="62" rx="3" ry="9" transform="rotate(30 134 62)"/>
    <ellipse cx="124" cy="46" rx="3" ry="9" transform="rotate(45 124 46)"/>
    <ellipse cx="110" cy="34" rx="3" ry="9" transform="rotate(60 110 34)"/>
    <ellipse cx="134" cy="98" rx="3" ry="9" transform="rotate(-20 134 98)"/>
    <ellipse cx="128" cy="116" rx="3" ry="9" transform="rotate(-35 128 116)"/>
    <ellipse cx="116" cy="130" rx="3" ry="9" transform="rotate(-50 116 130)"/>
  </g>
  <!-- Number -->
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="48" fill="#E89B1C" text-anchor="middle" font-weight="800" letter-spacing="-2">15</text>
  <text x="80" y="100" font-family="Inter, Arial, sans-serif" font-size="11" fill="#F7F9FC" text-anchor="middle" font-weight="600" letter-spacing="2">YEARS</text>
  <!-- Subline -->
  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-size="7" fill="#F7F9FC" text-anchor="middle" font-weight="500" letter-spacing="1.5">OF EXPERIENCE</text>
  <!-- Top dot decoration -->
  <circle cx="80" cy="22" r="3" fill="#E89B1C"/>
  <circle cx="80" cy="138" r="3" fill="#E89B1C"/>
</svg>
