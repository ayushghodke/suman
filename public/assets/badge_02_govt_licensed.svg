<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Government Electrical Licensed Contractor">
  <title>Government Electrical Licensed Contractor</title>
  <!-- Shield base -->
  <path d="M 80,12 L 142,30 L 142,82 Q 142,128 80,150 Q 18,128 18,82 L 18,30 Z"
